<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#efeee6;
    color:#111;
    overflow-x:hidden;
}

/* 主版面 */
.container{
    display:grid;
    grid-template-columns: 28% 72%;
    min-height:100vh;
}

/* 左側 */
.left{
    padding:40px 30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border-right:1px solid rgba(0,0,0,0.08);
}

.logo{
    font-size:1.2rem;
    font-weight:900;
    line-height:1;
    letter-spacing:-1px;
}

h1{
    font-size:5rem;
    line-height:0.92;
    color:#5a63ff;
    font-weight:900;
    margin:40px 0;
}

.desc{
    font-size:1.4rem;
    line-height:1.3;
    color:#5a63ff;
    font-family: monospace;
}

/* 右側 */
.right{
    position:relative;
    background:#ddd;
    overflow:hidden;
}

.topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    background:#111;
    color:white;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:5;
}

.menu{
    font-size:2rem;
}

.hero-img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.9);
}

/* 中間照片圓形 */
.profile-wrap{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:360px;
    height:360px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,0.35);
    z-index:3;
}

.profile-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PDF按鈕 */
.buttons{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
}

.btn{
    text-decoration:none;
    background:#111;
    color:white;
    padding:14px 26px;
    margin:0 10px;
    display:inline-block;
    transition:0.3s;
}

.btn:hover{
    background:#5a63ff;
}

/* 手機版 */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }

    .left{
        padding:25px;
    }

    h1{
        font-size:3rem;
    }

    .profile-wrap{
        width:240px;
        height:240px;
    }

    .right{
        min-height:70vh;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- 左側 -->
    <section class="left">
        <div>
            <div class="logo">MY<br>PORTFOLIO</div>

            <h1>The ideas<br>behind my<br>stories</h1>
        </div>

        <p class="desc">
            Welcome to my creative world,<br>
            where every project tells a story.
        </p>
    </section>

    <!-- 右側 -->
    <section class="right">

        <div class="topbar">
            <span>Explore My Work</span>
            <span class="menu">☰</span>
        </div>

        <!-- 背景圖 -->
        <img class="hero-img"
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80">

        <!-- 個人照片 -->
        <div class="profile-wrap">
            <img src="me.jpg" alt="我的照片">
        </div>

        <!-- 作品 -->
        <div class="buttons">
            <a href="work.pdf" target="_blank" class="btn">VIEW WORK</a>
            <a href="work.pdf" download class="btn">DOWNLOAD PDF</a>
        </div>

    </section>

</div>

</body>
</html>
