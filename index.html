<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Georgia", serif;
    background: #0b0f0c;
    color: white;
    overflow-x: hidden;
}

/* Hero 背景 */
.hero {
    min-height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 光束效果 */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 220px;
    height: 100%;
    transform: translateX(-50%);
    background: linear-gradient(
        to bottom,
        rgba(255,215,120,0.35),
        rgba(255,215,120,0)
    );
    filter: blur(30px);
}

.content {
    position: relative;
    z-index: 2;
    max-width: 1000px;
    width: 90%;
    display: flex;
    align-items: center;
    gap: 60px;
}

.text {
    flex: 1;
}

h1 {
    font-size: 4rem;
    line-height: 1.05;
    color: #d89a1d;
    margin-bottom: 20px;
}

.subtitle {
    font-family: Arial, sans-serif;
    font-size: 1.2rem;
    margin-bottom: 30px;
    opacity: 0.9;
}

.btn {
    display: inline-block;
    padding: 14px 28px;
    background: #d89a1d;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
    margin-right: 12px;
}

.btn:hover {
    background: #f2b53a;
    transform: translateY(-2px);
}

.photo {
    flex: 1;
    text-align: center;
}

.photo img {
    width: 320px;
    max-width: 100%;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    border: 3px solid rgba(216,154,29,0.6);
}

@media (max-width: 768px) {
    .content {
        flex-direction: column;
        text-align: center;
    }

    h1 {
        font-size: 2.7rem;
    }

    .photo img {
        width: 250px;
    }
}
</style>
</head>
<body>

<section class="hero">
    <div class="content">

        <div class="text">
            <h1>Welcome to<br>My Portfolio</h1>
            <p class="subtitle">
                Creative Works • Personal Story • Design Collection
            </p>

            <a href="work.pdf" class="btn" target="_blank">查看作品集</a>
            <a href="work.pdf" class="btn" download>下載 PDF</a>
        </div>

        <div class="photo">
            <img src="me.jpg" alt="我的照片">
        </div>

    </div>
</section>

</body>
</html>
